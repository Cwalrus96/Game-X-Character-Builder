<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game X — Character Builder (Techniques)</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="builder.css" />
  </head>
  <body>
    <div class="topbar">
      <div>
        <a class="btn" href="characters.html">← Characters</a>
        <span class="muted" id="gmHint" style="display:none; margin-left: 8px;"></span>
      </div>
      <div class="right">
        <span class="muted" id="whoami">Loading…</span>
        <button id="signOutBtn" class="btn" style="display:none; margin-left: 8px;">Sign out</button>
      </div>
    </div>

    <main class="builder" data-builder-step="techniques">
      <header class="builderHeader">
        <div>
          <h1>Character Builder</h1>
          <p class="muted" id="status">Loading…</p>
          <p class="error" id="error" style="display:none"></p>
        </div>
        <div id="builderNavTop"></div>
      </header>

      <section class="card">
        <div class="cardHeaderRow">
          <h2>Techniques</h2>
          <span class="muted" id="slotHint"></span>
        </div>

        <div class="grid2">
          <div>
            <h3 class="h3" style="margin-top:0">Selection</h3>
            <div class="pillRow" id="slotPills"></div>

            <label class="label" for="techSearch" style="margin-top:12px">Search</label>
            <input id="techSearch" class="input" type="text" placeholder="Search techniques…" />

            <label style="margin-top:10px; display:flex; gap:8px; align-items:center;">
              <input id="filterKnownSkills" type="checkbox" checked />
              <span class="muted">Show only techniques for my combat skills</span>
            </label>

            <p class="help" id="knownSkillsHelp"></p>
          </div>

          <div>
            <h3 class="h3" style="margin-top:0">Granted (doesn’t use slots)</h3>
            <div id="grantedList" class="muted">—</div>

            <h3 class="h3" style="margin-top:12px">Missing references</h3>
            <div id="missingList" class="muted">—</div>

            <div style="margin-top:12px">
              <a class="btn secondary" id="openSheetLink" href="#">Open character sheet to add a custom technique</a>
            </div>
          </div>
        </div>

        <div style="margin-top:14px" id="techniqueGroups"></div>
      </section>

      <footer class="builderFooter">
        <div id="builderNavBottom"></div>

        <div class="actions">
          <button id="saveBtn" class="btn" type="button">Save</button>
          <button id="saveAndOpenBtn" class="btn secondary" type="button">Save &amp; Open Character Sheet</button>
        </div>
      </footer>
    </main>

    <script type="module" src="builder-techniques.js"></script>
  </body>
</html>
