<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game X Character Builder – Sign In</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body data-theme="na" class="login-page">
  <main class="page">
    <section class="card">
      <p class="section-kicker">Access</p>
      <h1>Game X Character Builder</h1>
      <p class="muted login-copy">
        Sign in to create and manage characters.
      </p>

      <div class="row actions-row">
        <button id="signInBtn" class="btn" type="button">Sign in with Google</button>
        <a id="continueLink" class="btn secondary" href="characters.html" style="display:none">Continue</a>
      </div>

      <div id="status" class="muted status-text">Checking sign-in status…</div>
      <div id="error" class="error" style="display:none"></div>
    </section>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
