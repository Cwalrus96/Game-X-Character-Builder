<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game X Character Builder – GM Users</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/gm_users.css" />
</head>
<body class="gm-users-page" data-theme="na">
  <div class="page">
    <div class="topbar">
      <div class="brand">Game X Character Builder</div>
      <div class="row">
        <a class="btn secondary" href="/characters.html">Back</a>
        <button class="btn secondary" id="signOutBtn" type="button">Sign out</button>
      </div>
    </div>

    <div class="card">
      <div class="section-head">
        <div>
          <h1 class="section-title">GM: Users</h1>
          <p class="muted intro-copy">Select a user to view their character list.</p>
        </div>
      </div>
      <div id="status" class="muted">Loading…</div>
      <div id="error" class="error" style="display:none"></div>

      <div class="table-wrap">
        <table aria-label="User list">
          <thead>
            <tr>
              <th>Display Name</th>
              <th>Email</th>
              <th class="small">UID</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="userRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="/js/pages/gm_users.js"></script>
</body>
</html>
